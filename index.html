<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miešanie farieb</title>
<style>

:root {
  --bg:#0f1418;
  --panel:#ddd2b8;
  --line:#bcae90;
  --muted:#5f5a52;
  --text:#111;
  --soft:rgba(255,255,255,.35);
  --box:#e79a96;
  --ok:#123d1a;
  --btn:#ddd2b8;
  --chip:#c9bda4;
  --brand-card:#ddd2b8;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
.wrap { max-width:640px; margin:0 auto; padding:12px; }
.screen { display:none; }
.screen.active { display:block; }
.topbar { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.backBtn, .homeBtn { border:none; background:var(--btn); color:var(--text); border-radius:12px; padding:10px 14px; font-size:14px; font-weight:700; box-shadow:0 2px 0 rgba(0,0,0,.08); }
.headerBox { background:var(--panel); border-radius:20px; padding:16px 14px; margin-bottom:12px; text-align:center; }
.headerTitle { font-size:28px; font-weight:800; line-height:1; margin-bottom:6px; }
.headerSub { font-size:13px; color:var(--muted); line-height:1.35; }
.menuGrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.menuCard { border:none; width:100%; text-align:center; border-radius:18px; padding:12px 10px; min-height:132px; box-shadow:0 8px 22px rgba(0,0,0,.18); display:flex; flex-direction:column; justify-content:center; align-items:center; }
.logoWrap { width:100%; height:64px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
.logoWrap img { max-width:100%; max-height:60px; width:auto; height:auto; object-fit:contain; display:block; transition:filter .2s; }
.logo-dark img { filter:brightness(0) saturate(100%); }
.logo-light img { filter:brightness(0) invert(1); }
.logoFallback { font-size:22px; font-weight:800; line-height:1.05; }
.menuVariant { font-size:12px; color:#111; font-weight:700; line-height:1.15; }
.menuCount { font-size:11px; color:rgba(0,0,0,.65); margin-top:4px; }
.product { background:var(--panel); border-radius:18px; padding:12px; box-shadow:0 8px 22px rgba(0,0,0,.2); }
.productHeader { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.swatch { width:26px; height:26px; border-radius:8px; border:1px solid rgba(0,0,0,.15); flex:0 0 auto; }
.title { font-size:22px; font-weight:800; line-height:1; }
.variant { margin-top:2px; color:var(--muted); font-size:12px; line-height:1.1; }
.cols { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:0; border-top:1px solid var(--line); }
.col { padding:8px 8px 6px; min-width:0; }
.col.left { border-right:2px solid var(--line); }
.colTitle { text-align:center; font-size:20px; font-weight:800; line-height:1; margin:2px 0 4px; }
.ratio { text-align:center; color:var(--muted); font-size:12px; margin-bottom:6px; line-height:1.15; }
.info { background:var(--soft); border-radius:12px; padding:8px; margin-bottom:6px; font-size:12px; line-height:1.18; }
.label { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.3px; margin-bottom:1px; }
.name { font-size:12px; font-weight:800; margin-bottom:1px; overflow-wrap:anywhere; word-break:break-word; }
.code { font-size:10px; color:var(--muted); margin-bottom:5px; overflow-wrap:anywhere; word-break:break-all; }
.code:last-child { margin-bottom:0; }
.boxLabel { text-align:center; font-weight:800; font-size:12px; margin:0 0 3px; }
.valueBox, .result { width:100%; min-height:54px; border:none; border-radius:14px; background:var(--box); text-align:center; box-shadow:inset 0 0 0 1px rgba(0,0,0,.06); }
.valueBox { outline:none; color:var(--text); font-size:24px; font-weight:800; padding:6px 8px; margin-bottom:5px; }
.valueBox::placeholder { color:rgba(0,0,0,.34); font-size:18px; }
.valueBox:disabled { opacity:.7; }
.result { display:flex; align-items:center; justify-content:center; color:var(--ok); font-size:22px; font-weight:800; padding:6px 8px; }
.result.disabled { color:#444; font-size:16px; }
.adjustRow { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-bottom:10px; }
.stepBtn { width:100%; min-width:0; border:none; border-radius:12px; background:var(--chip); color:var(--text); font-weight:800; font-size:14px; padding:16px 10px; min-height:52px; box-shadow:0 2px 0 rgba(0,0,0,.08); }
.resetWrap { text-align:center; margin-top:6px; }
.resetBtn { border:none; border-radius:10px; padding:8px 12px; background:var(--chip); font-weight:800; box-shadow:0 2px 0 rgba(0,0,0,.08); }
.footer { margin-top:6px; text-align:center; color:var(--muted); font-size:10px; line-height:1.2; }
@media (max-width:430px) {
  .wrap { padding:10px; }
  .menuGrid { gap:10px; }
  .menuCard { min-height:124px; padding:10px 8px; }
  .logoWrap { height:58px; }
  .logoWrap img { max-height:54px; }
  .headerTitle { font-size:24px; }
  .title { font-size:20px; }
  .colTitle { font-size:18px; }
  .valueBox, .result { min-height:50px; }
  .valueBox { font-size:22px; }
  .result { font-size:19px; }
  .stepBtn { padding:7px 6px; font-size:10px; }
}

</style>

<style>
  #update-banner {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 9999;
    display: none;
    background: linear-gradient(180deg, #9fbb88 0%, #89a874 100%);
    color: #111;
    border-radius: 16px;
    padding: 12px 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,.28);
    border: 1px solid rgba(0,0,0,.12);
    font-family: Arial, Helvetica, sans-serif;
  }
  #update-banner .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  #update-banner .text {
    font-size: 14px;
    line-height: 1.25;
    font-weight: 700;
  }
  #update-banner .sub {
    font-size: 12px;
    color: rgba(17,17,17,.72);
    margin-top: 4px;
    font-weight: 600;
  }
  #update-banner button {
    border: none;
    border-radius: 12px;
    background: #ddd2b8;
    color: #111;
    font-weight: 700;
    padding: 10px 14px;
    min-width: 96px;
    box-shadow: 0 2px 0 rgba(0,0,0,.08);
  }
</style>


<style>
#app-version{
  position:fixed;
  bottom:6px;
  left:0;
  right:0;
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,0.28);
  pointer-events:none;
  font-weight:500;
  z-index:9998;
}
</style>

  detailScreen.classList.add("active");
  detailContent.innerHTML = `
    <div class="product">
      <div class="productHeader">
        <div class="swatch" style="background:${p.swatch}"></div>
        <div>
          <div class="title">${p.brand}</div>
          ${p.variant ? `<div class="variant">${p.variant}</div>` : ``}
        </div>
      </div>
      <div class="cols">
        <div class="col left">
          <div class="colTitle">Základ</div>
          <div class="ratio">Pomer: ${p.primer.ratioText}</div>
          ${infoHtml(p.primer)}
          <div class="boxLabel">FARBA</div>
          <input id="primerInput" class="valueBox" type="number" step="0.001" min="0" placeholder="kg" ${p.primer.ratio ? "" : "disabled"}>
          <div class="adjustRow">
            <button class="stepBtn" onclick="adjustInputValue('primerInput','primerResult',${p.primer.ratio ?? "null"},-1)" ${p.primer.ratio ? "" : "disabled"}>-1 kg</button>
            <button class="stepBtn" onclick="adjustInputValue('primerInput','primerResult',${p.primer.ratio ?? "null"},1)" ${p.primer.ratio ? "" : "disabled"}>+1 kg</button>
            <button class="stepBtn" onclick="adjustInputValue('primerInput','primerResult',${p.primer.ratio ?? "null"},-0.1)" ${p.primer.ratio ? "" : "disabled"}>-100 g</button>
            <button class="stepBtn" onclick="adjustInputValue('primerInput','primerResult',${p.primer.ratio ?? "null"},0.1)" ${p.primer.ratio ? "" : "disabled"}>+100 g</button>
          </div>
          <div class="boxLabel">TUŽIDLO</div>
          <div id="primerResult" class="result ${p.primer.ratio ? "" : "disabled"}">${p.primer.ratio ? "—" : "Nepoužíva sa"}</div>
        </div>
        <div class="col">
          <div class="colTitle">Vrch</div>
          <div class="ratio">Pomer: ${p.top.ratioText}</div>
          ${infoHtml(p.top)}
          <div class="boxLabel">FARBA</div>
          <input id="topInput" class="valueBox" type="number" step="0.001" min="0" placeholder="kg" ${p.top.ratio ? "" : "disabled"}>
          <div class="adjustRow">
            <button class="stepBtn" onclick="adjustInputValue('topInput','topResult',${p.top.ratio ?? "null"},-1)" ${p.top.ratio ? "" : "disabled"}>-1 kg</button>
            <button class="stepBtn" onclick="adjustInputValue('topInput','topResult',${p.top.ratio ?? "null"},1)" ${p.top.ratio ? "" : "disabled"}>+1 kg</button>
            <button class="stepBtn" onclick="adjustInputValue('topInput','topResult',${p.top.ratio ?? "null"},-0.1)" ${p.top.ratio ? "" : "disabled"}>-100 g</button>
            <button class="stepBtn" onclick="adjustInputValue('topInput','topResult',${p.top.ratio ?? "null"},0.1)" ${p.top.ratio ? "" : "disabled"}>+100 g</button>
          </div>
          <div class="boxLabel">TUŽIDLO</div>
          <div id="topResult" class="result ${p.top.ratio ? "" : "disabled"}">${p.top.ratio ? "—" : "Nepoužíva sa"}</div>
        </div>
      </div>
      <div class="footer">Zadaj množstvo farby v kg. Výsledok je potrebné množstvo tužidla.</div>
      <div class="resetWrap"><button class="resetBtn" onclick="resetKg()">Reset kg</button></div>
    </div>
  `;
  const primerInput = document.getElementById("primerInput");
  const primerResult = document.getElementById("primerResult");
  if (p.primer.ratio) {
    primerInput.addEventListener("input", e => {
      const v = parseFloat(e.target.value);
      primerResult.textContent = (!isNaN(v) && v >= 0) ? formatKg(calc(v, p.primer.ratio)) : "—";
    });
  }
  if (p.top.ratio) {
    const topInput = document.getElementById("topInput");
    const topResult = document.getElementById("topResult");
    topInput.addEventListener("input", e => {
      const v = parseFloat(e.target.value);
      topResult.textContent = (!isNaN(v) && v >= 0) ? formatKg(calc(v, p.top.ratio)) : "—";
    });
  }
}
function renderBrands() {
  brandGrid.innerHTML = brands.map(b => {
    const count = products.filter(p => p.brandId === b.id).length;
    return `
      <button class="menuCard" data-id="${b.id}" style="background:var(--brand-card)">
        ${logoHtmlByKey(b.logoKey, b.name, "#ddd2b8")}
        <div class="menuVariant">${b.name}</div>
        <div class="menuCount">${count} ${count === 1 ? "odtieň" : (count >= 2 && count <= 4 ? "odtiene" : "odtieňov")}</div>
      </button>
    `;
  }).join("");
  document.querySelectorAll("#brandGrid .menuCard").forEach(btn => {
    btn.addEventListener("click", () => showVariants(btn.dataset.id));
  });
}
document.getElementById("variantBackBtn").addEventListener("click", showBrands);
document.getElementById("variantHomeBtn").addEventListener("click", showBrands);
document.getElementById("detailBackBtn").addEventListener("click", () => { if (currentBrandId) showVariants(currentBrandId); else showBrands(); });
document.getElementById("detailHomeBtn").addEventListener("click", showBrands);
renderBrands();
</script>



<div id="update-banner">
  <div class="row">
    <div>
      <div class="text">Dostupná nová verzia appky</div>
      <div class="sub" id="update-banner-sub">Aktuálna verzia: — • Nová verzia: —</div>
    </div>
    <button id="update-refresh-btn">Obnoviť</button>
  </div>
</div>

<div id="app-version"></div>

<script>
const VERSION_STORAGE_KEY = "mf_installed_version";

function setInstalledVersion(v) {
  try { localStorage.setItem(VERSION_STORAGE_KEY, v); } catch (e) {}
}

function getInstalledVersion() {
  try { return localStorage.getItem(VERSION_STORAGE_KEY); } catch (e) { return null; }
}

async function fetchServerVersion() {
  const res = await fetch('./version.json?ts=' + Date.now(), { cache: 'no-store' });
  const data = await res.json();
  return data.version || "v2";
}

function renderFooterVersion(v) {
  const el = document.getElementById("app-version");
  if (!el) return;
  el.textContent = v || "v?";
}

function showUpdateBanner(currentVer, latestVer) {
  const banner = document.getElementById('update-banner');
  const sub = document.getElementById('update-banner-sub');
  const btn = document.getElementById('update-refresh-btn');
  if (!banner || !sub || !btn) return;

  sub.textContent = `Aktuálna verzia: ${currentVer} • Nová verzia: ${latestVer}`;
  banner.style.display = 'block';

  btn.onclick = async () => {
    setInstalledVersion(latestVer);

    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        await reg.update();
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      }
    } catch (e) {
      console.log('Update check failed:', e);
    }

    window.location.reload();
  };
}

async function bootAppVersion() {
  let serverVersion = "v2";
  try {
    serverVersion = await fetchServerVersion();
  } catch (e) {
    console.log('Version fetch failed:', e);
  }

  let installedVersion = getInstalledVersion();

  if (!installedVersion) {
    installedVersion = serverVersion;
    setInstalledVersion(installedVersion);
  }

  renderFooterVersion(installedVersion);

  if (serverVersion !== installedVersion) {
    showUpdateBanner(installedVersion, serverVersion);
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      await reg.update();

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    } catch (err) {
      console.log('SW registration failed:', err);
    }

    await bootAppVersion();
  });
} else {
  window.addEventListener('load', bootAppVersion);
}
</script>
